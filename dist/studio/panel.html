<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>查爾斯的生活空間｜寫作後台</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .admin-shell { max-width: 980px; }
      .admin-topbar { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
      .admin-form { display: grid; gap: 18px; }
      .admin-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
      .admin-field { display: grid; gap: 8px; }
      .admin-field label, .toolbar-label { color: var(--muted); font-size: 0.95rem; }
      .admin-field input, .admin-field select, .admin-field textarea {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
        font: inherit;
      }
      .admin-field textarea { min-height: 340px; resize: vertical; line-height: 1.8; }
      .admin-actions, .toolbar, .image-tools { display: flex; flex-wrap: wrap; gap: 12px; }
      .tool-button {
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.75);
        color: var(--ink);
        cursor: pointer;
        font: inherit;
      }
      .image-tools input[type="file"] { max-width: 260px; }
      .admin-note, .admin-result, .storage-note { color: var(--muted); line-height: 1.8; }
      .admin-result a { color: var(--accent); }
      .storage-box {
        padding: 18px 20px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.5);
      }
      @media (max-width: 760px) {
        .admin-grid, .admin-topbar { grid-template-columns: 1fr; display: grid; }
      }
    </style>
  </head>
  <body>
    <div class="page-shell admin-shell">
      <section class="section">
        <div class="admin-topbar">
          <div>
            <p class="eyebrow">Publishing Studio</p>
            <h1 class="admin-title">查爾斯的生活空間｜寫作後台</h1>
          </div>
          <button class="button button-secondary" type="button" id="logout-button">登出</button>
        </div>

        <p class="article-lead">
          這裡的內容會直接寫進 GitHub repo。已發佈文章在 <code>content/posts</code>，
          草稿在 <code>content/drafts</code>，圖片在 <code>public/uploads</code>。
        </p>

        <div class="storage-box">
          <p class="storage-note">
            已發佈文章：<code>content/posts/*.md</code><br />
            草稿：<code>content/drafts/*.md</code><br />
            圖片：<code>public/uploads/*</code>
          </p>
        </div>

        <form class="admin-form" id="admin-form">
          <div class="admin-grid">
            <div class="admin-field">
              <label for="owner">GitHub 帳號</label>
              <input id="owner" name="owner" placeholder="例如 charles" required />
            </div>
            <div class="admin-field">
              <label for="repo">Repo 名稱</label>
              <input id="repo" name="repo" placeholder="例如 charles-life-space" required />
            </div>
            <div class="admin-field">
              <label for="branch">Branch</label>
              <input id="branch" name="branch" value="main" required />
            </div>
            <div class="admin-field">
              <label for="token">GitHub Token</label>
              <input id="token" name="token" type="password" placeholder="ghp_xxx" required />
            </div>
          </div>

          <div class="admin-grid">
            <div class="admin-field">
              <label for="title">文章標題</label>
              <input id="title" name="title" required />
            </div>
            <div class="admin-field">
              <label for="date">日期</label>
              <input id="date" name="date" type="date" required />
            </div>
            <div class="admin-field">
              <label for="category">分類</label>
              <select id="category" name="category" required>
                <option value="life">生活</option>
                <option value="study">學習</option>
                <option value="travel">旅遊</option>
              </select>
            </div>
            <div class="admin-field">
              <label for="slug">Slug</label>
              <input id="slug" name="slug" placeholder="會依標題自動產生，可手改" />
            </div>
          </div>

          <div class="admin-field">
            <label for="excerpt">文章摘要</label>
            <textarea id="excerpt" name="excerpt" rows="4" style="min-height: 110px;"></textarea>
          </div>

          <div class="admin-field">
            <span class="toolbar-label">寫作工具</span>
            <div class="toolbar">
              <button class="tool-button" type="button" data-insert="# ">H1</button>
              <button class="tool-button" type="button" data-insert="## ">H2</button>
              <button class="tool-button" type="button" data-wrap="**" data-placeholder="粗體文字">粗體</button>
              <button class="tool-button" type="button" data-line-prefix="> ">引用</button>
              <button class="tool-button" type="button" data-line-prefix="- ">清單</button>
              <button class="tool-button" type="button" data-replace="[連結文字](https://)">連結</button>
            </div>
          </div>

          <div class="admin-field">
            <label for="body">文章內容（Markdown）</label>
            <textarea id="body" name="body" placeholder="# 小標&#10;&#10;正文寫在這裡" required></textarea>
          </div>

          <div class="admin-field">
            <span class="toolbar-label">圖片插入</span>
            <div class="image-tools">
              <input id="image-file" type="file" accept="image/*" />
              <button class="tool-button" type="button" id="upload-image-button">上傳圖片並插入</button>
            </div>
          </div>

          <div class="admin-actions">
            <button class="button button-secondary" type="button" id="load-local-draft-button">恢復本機草稿</button>
            <button class="button button-secondary" type="button" id="load-draft-button">載入雲端草稿</button>
            <button class="button button-secondary" type="button" id="save-draft-button">儲存草稿</button>
            <button class="button button-secondary" type="button" id="save-settings">記住 Repo 設定</button>
            <button class="button button-primary" type="submit">發佈文章</button>
          </div>
        </form>

        <p class="admin-note">
          這個後台會自動把表單內容暫存在本機，避免你下次回來時從零開始。
          按下「儲存草稿」後，還會同步存一份到 GitHub 的 <code>content/drafts</code>。
        </p>

        <div class="admin-result" id="admin-result"></div>
      </section>
    </div>

    <script src="./auth-config.js"></script>
    <script>
      const config = window.studioAuthConfig;
      const params = new URLSearchParams(window.location.search);
      const accessKey = params.get("access");

      function getSession() {
        try {
          const raw = localStorage.getItem(config.storageKey);
          if (!raw) return null;
          const session = JSON.parse(raw);
          if (!session.expiresAt || Date.now() > session.expiresAt) {
            localStorage.removeItem(config.storageKey);
            return null;
          }
          return session;
        } catch {
          return null;
        }
      }

      if (accessKey === config.password) {
        try {
          const expiresAt = Date.now() + config.sessionHours * 60 * 60 * 1000;
          localStorage.setItem(config.storageKey, JSON.stringify({ expiresAt }));
        } catch {}
        history.replaceState({}, "", "./panel.html");
      } else if (!getSession()) {
        window.location.replace("./index.html");
      }

      const form = document.querySelector("#admin-form");
      const result = document.querySelector("#admin-result");
      const bodyField = document.querySelector("#body");
      const saveSettingsButton = document.querySelector("#save-settings");
      const saveDraftButton = document.querySelector("#save-draft-button");
      const loadDraftButton = document.querySelector("#load-draft-button");
      const loadLocalDraftButton = document.querySelector("#load-local-draft-button");
      const uploadImageButton = document.querySelector("#upload-image-button");
      const imageFileInput = document.querySelector("#image-file");
      const logoutButton = document.querySelector("#logout-button");

      const fields = {
        owner: document.querySelector("#owner"),
        repo: document.querySelector("#repo"),
        branch: document.querySelector("#branch"),
        token: document.querySelector("#token"),
        title: document.querySelector("#title"),
        date: document.querySelector("#date"),
        category: document.querySelector("#category"),
        slug: document.querySelector("#slug"),
        excerpt: document.querySelector("#excerpt"),
        body: bodyField
      };

      const settingsKey = "charles-life-space-admin";
      const localDraftKey = "charles-life-space-local-draft";
      let autosaveTimer = null;

      hydrateSettings();
      if (!fields.date.value) fields.date.value = new Date().toISOString().slice(0, 10);

      fields.title.addEventListener("input", () => {
        if (!fields.slug.dataset.editedManually) fields.slug.value = slugify(fields.title.value);
      });
      fields.slug.addEventListener("input", () => { fields.slug.dataset.editedManually = "true"; });
      Object.values(fields).forEach((field) => field.addEventListener("input", queueAutosave));

      document.querySelectorAll(".tool-button[data-insert], .tool-button[data-wrap], .tool-button[data-line-prefix], .tool-button[data-replace]").forEach((button) => {
        button.addEventListener("click", () => {
          if (button.dataset.wrap) wrapSelection(button.dataset.wrap, button.dataset.placeholder || "文字");
          else if (button.dataset.linePrefix) insertLinePrefix(button.dataset.linePrefix);
          else if (button.dataset.replace) replaceSelection(button.dataset.replace);
          else if (button.dataset.insert) insertAtCursor(`\n${button.dataset.insert}`);
        });
      });

      saveSettingsButton.addEventListener("click", () => {
        persistSettings();
        renderMessage("已記住目前的 GitHub 設定。", false);
      });

      loadLocalDraftButton.addEventListener("click", () => {
        if (!hydrateLocalDraft()) {
          renderMessage("目前沒有本機草稿可恢復。", true);
          return;
        }
        renderMessage("已恢復本機草稿。", false);
      });

      saveDraftButton.addEventListener("click", async () => {
        const payload = getPayload();
        if (!payload.slug) {
          renderMessage("請先填寫標題或 slug，才能存成草稿。", true);
          return;
        }
        saveLocalDraft(payload);
        if (!hasRepoConfig(payload)) {
          renderMessage("草稿已存在本機；填好 repo 設定後可再同步到 GitHub。", false);
          return;
        }
        try {
          await upsertContent({
            payload,
            targetPath: `content/drafts/${payload.slug}.md`,
            commitMessage: `Save draft: ${payload.title || payload.slug}`,
            content: createMarkdown(payload)
          });
          renderMessage("草稿已同步到 GitHub 的 content/drafts。", false);
        } catch (error) {
          renderMessage(`雲端草稿保存失敗：${error.message}`, true);
        }
      });

      loadDraftButton.addEventListener("click", async () => {
        const payload = getPayload();
        if (!payload.slug) {
          renderMessage("請先填寫 slug，才能載入對應草稿。", true);
          return;
        }
        if (!hasRepoConfig(payload)) {
          renderMessage("請先填 repo 設定，才能載入雲端草稿。", true);
          return;
        }
        try {
          const data = await getContent({
            owner: payload.owner,
            repo: payload.repo,
            branch: payload.branch,
            token: payload.token,
            targetPath: `content/drafts/${payload.slug}.md`
          });
          const parsed = parseMarkdownFile(data.content);
          fillForm({ ...payload, slug: payload.slug, ...parsed });
          saveLocalDraft(getPayload());
          renderMessage("已載入雲端草稿。", false);
        } catch (error) {
          renderMessage(`載入草稿失敗：${error.message}`, true);
        }
      });

      uploadImageButton.addEventListener("click", async () => {
        const file = imageFileInput.files[0];
        const payload = getPayload();
        if (!file) {
          renderMessage("請先選擇一張圖片。", true);
          return;
        }
        if (!hasRepoConfig(payload)) {
          renderMessage("要上傳圖片前，請先填 GitHub 帳號、repo、branch 和 token。", true);
          return;
        }
        try {
          renderMessage("圖片上傳中...", false);
          const safeName = `${Date.now()}-${file.name.replace(/[^a-zA-Z0-9._-]+/g, "-")}`;
          await upsertRawContent({
            owner: payload.owner,
            repo: payload.repo,
            branch: payload.branch,
            token: payload.token,
            targetPath: `public/uploads/${safeName}`,
            commitMessage: `Upload image: ${safeName}`,
            content: await fileToBase64(file)
          });
          insertAtCursor(`\n![${file.name.replace(/\.[^.]+$/, "")}](../uploads/${safeName})\n`);
          renderMessage("圖片已上傳並插入文章。", false);
        } catch (error) {
          renderMessage(`圖片上傳失敗：${error.message}`, true);
        }
      });

      logoutButton.addEventListener("click", () => {
        try { localStorage.removeItem(config.storageKey); } catch {}
        window.location.replace("./index.html");
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const payload = getPayload();
        if (!payload.slug) {
          renderMessage("請先填寫標題或 slug。", true);
          return;
        }
        if (!hasRepoConfig(payload)) {
          renderMessage("要發佈文章前，請先填 GitHub 帳號、repo、branch 和 token。", true);
          return;
        }
        persistSettings();
        saveLocalDraft(payload);
        try {
          renderMessage("發佈中，正在把文章寫進 GitHub repo...", false);
          await upsertContent({
            payload,
            targetPath: `content/posts/${payload.slug}.md`,
            commitMessage: `Publish post: ${payload.title}`,
            content: createMarkdown(payload)
          });
          renderMessage("文章已發佈，內容已存進 GitHub 的 content/posts。", false);
        } catch (error) {
          renderMessage(`發佈失敗：${error.message}`, true);
        }
      });

      function queueAutosave() {
        clearTimeout(autosaveTimer);
        autosaveTimer = setTimeout(() => {
          saveLocalDraft(getPayload());
          renderMessage("本機草稿已自動保存。", false);
        }, 500);
      }

      function saveLocalDraft(payload) {
        try { localStorage.setItem(localDraftKey, JSON.stringify(payload)); } catch {}
      }

      function hydrateLocalDraft() {
        try {
          const raw = localStorage.getItem(localDraftKey);
          if (!raw) return false;
          fillForm(JSON.parse(raw));
          return true;
        } catch {
          return false;
        }
      }

      function persistSettings() {
        try {
          localStorage.setItem(settingsKey, JSON.stringify({
            owner: fields.owner.value.trim(),
            repo: fields.repo.value.trim(),
            branch: fields.branch.value.trim(),
            token: fields.token.value.trim()
          }));
        } catch {}
      }

      function hydrateSettings() {
        try {
          const raw = localStorage.getItem(settingsKey);
          if (!raw) return;
          const saved = JSON.parse(raw);
          fields.owner.value = saved.owner || "";
          fields.repo.value = saved.repo || "";
          fields.branch.value = saved.branch || "main";
          fields.token.value = saved.token || "";
        } catch {}
      }

      function getPayload() {
        return {
          owner: fields.owner.value.trim(),
          repo: fields.repo.value.trim(),
          branch: fields.branch.value.trim(),
          token: fields.token.value.trim(),
          title: fields.title.value.trim(),
          date: fields.date.value.trim(),
          category: fields.category.value,
          slug: (fields.slug.value.trim() || slugify(fields.title.value)).replace(/\.md$/i, ""),
          excerpt: fields.excerpt.value.trim(),
          body: fields.body.value.trim()
        };
      }

      function fillForm(payload) {
        fields.owner.value = payload.owner || fields.owner.value;
        fields.repo.value = payload.repo || fields.repo.value;
        fields.branch.value = payload.branch || fields.branch.value;
        fields.token.value = payload.token || fields.token.value;
        fields.title.value = payload.title || "";
        fields.date.value = payload.date || new Date().toISOString().slice(0, 10);
        fields.category.value = payload.category || "life";
        fields.slug.value = payload.slug || "";
        fields.excerpt.value = payload.excerpt || "";
        fields.body.value = payload.body || "";
      }

      async function upsertContent({ payload, targetPath, commitMessage, content }) {
        return upsertRawContent({
          owner: payload.owner,
          repo: payload.repo,
          branch: payload.branch,
          token: payload.token,
          targetPath,
          commitMessage,
          content: toBase64(content)
        });
      }

      async function upsertRawContent({ owner, repo, branch, token, targetPath, commitMessage, content }) {
        const existing = await getContent({ owner, repo, branch, token, targetPath, allowMissing: true });
        const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${targetPath}`, {
          method: "PUT",
          headers: {
            Authorization: `Bearer ${token}`,
            Accept: "application/vnd.github+json",
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: commitMessage,
            content,
            branch,
            ...(existing && existing.sha ? { sha: existing.sha } : {})
          })
        });
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          throw new Error(error.message || `GitHub API error: ${response.status}`);
        }
        return response.json();
      }

      async function getContent({ owner, repo, branch, token, targetPath, allowMissing = false }) {
        const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${targetPath}?ref=${encodeURIComponent(branch)}`, {
          headers: {
            Authorization: `Bearer ${token}`,
            Accept: "application/vnd.github+json"
          }
        });
        if (allowMissing && response.status === 404) return null;
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          throw new Error(error.message || `GitHub API error: ${response.status}`);
        }
        const data = await response.json();
        return { sha: data.sha, content: data.content ? decodeBase64(data.content) : "" };
      }

      function parseMarkdownFile(source) {
        const match = source.match(/^---\n([\s\S]*?)\n---\n\n?([\s\S]*)$/);
        if (!match) return { body: source };
        const meta = {};
        match[1].split("\n").forEach((line) => {
          const separator = line.indexOf(":");
          if (separator === -1) return;
          meta[line.slice(0, separator).trim()] = line.slice(separator + 1).trim();
        });
        return {
          title: meta.title || "",
          date: meta.date || "",
          category: meta.category || "life",
          excerpt: meta.excerpt || "",
          body: match[2] || ""
        };
      }

      function createMarkdown(payload) {
        return `---\ntitle: ${payload.title}\ndate: ${payload.date}\ncategory: ${payload.category}\nexcerpt: ${payload.excerpt}\n---\n\n${payload.body}\n`;
      }

      function hasRepoConfig(payload) {
        return payload.owner && payload.repo && payload.branch && payload.token;
      }

      function slugify(value) {
        return value.toLowerCase().trim().replace(/[\s_]+/g, "-").replace(/[^a-z0-9-\u4e00-\u9fa5]+/g, "").replace(/-+/g, "-").replace(/^-|-$/g, "");
      }

      function wrapSelection(wrapper, placeholder) {
        const start = bodyField.selectionStart;
        const end = bodyField.selectionEnd;
        const selected = bodyField.value.slice(start, end) || placeholder;
        bodyField.setRangeText(`${wrapper}${selected}${wrapper}`, start, end, "end");
        bodyField.focus();
      }

      function replaceSelection(replacement) {
        const start = bodyField.selectionStart;
        const end = bodyField.selectionEnd;
        const selected = bodyField.value.slice(start, end);
        bodyField.setRangeText(replacement.replace("連結文字", selected || "連結文字"), start, end, "end");
        bodyField.focus();
      }

      function insertLinePrefix(prefix) {
        const start = bodyField.selectionStart;
        const end = bodyField.selectionEnd;
        const selected = bodyField.value.slice(start, end);
        bodyField.setRangeText(`${prefix}${selected}`, start, end, "end");
        bodyField.focus();
      }

      function insertAtCursor(text) {
        const start = bodyField.selectionStart;
        const end = bodyField.selectionEnd;
        bodyField.setRangeText(text, start, end, "end");
        bodyField.focus();
      }

      function toBase64(value) {
        return btoa(unescape(encodeURIComponent(value)));
      }

      function decodeBase64(value) {
        return decodeURIComponent(escape(atob(value.replace(/\n/g, ""))));
      }

      async function fileToBase64(file) {
        const buffer = await file.arrayBuffer();
        let binary = "";
        const bytes = new Uint8Array(buffer);
        const chunkSize = 0x8000;
        for (let i = 0; i < bytes.length; i += chunkSize) {
          binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
        }
        return btoa(binary);
      }

      function renderMessage(message, isError) {
        result.innerHTML = message;
        result.style.color = isError ? "#8a2f25" : "";
      }
    </script>
  </body>
</html>
